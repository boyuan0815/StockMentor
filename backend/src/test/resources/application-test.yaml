spring:
  datasource:
    url: jdbc:h2:mem:stockmentor;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

twelvedata:
  api:
    key: test-twelvedata-key

openai:
  api:
    key: test-openai-key
  model: gpt-4o-mini

stockmentor:
  admin:
    token: test-admin-token
